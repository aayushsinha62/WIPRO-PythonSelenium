[pytest]
addopts= -v --html=reports/report.html
testpaths = tests



;pages → Stores page-specific actions and locators so UI changes don’t break tests everywhere
;
;tests → Contains actual test cases that verify application behavior
;
;utilities/ → Holds common helper code like driver setup, waits, configs, and logs
;
;conftest.py → Manages shared setup/teardown using pytest fixtures (like browser start/close)
;
;pytest.ini → Controls pytest settings such as markers, verbosity, and test discovery
;
;requirements.txt → Lists all Python packages needed to run the test framework